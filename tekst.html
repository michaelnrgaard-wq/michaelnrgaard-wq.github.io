      title: "Andreas døde i tragisk arbejdsulykke: Nåede aldrig at blive gammel på sin drømmeø",
      meta:  "Fyns Amts Avis · 8. juni 2021",
      body: `
        <p class="lead">Han talte otte sprog, spiste middag med den ukrainske mafia og plantede solsikker på Ærø. Andreas levede et hektisk liv. Han kæmpede sin vej fra trange kår i Polen til en tilværelse i Danmark, som han håbede ville vare i mange år, men desværre blev afbrudt alt for tidligt i en tragisk arbejdsulykke.</p>

        <img src="images/tekst/andreas/01-lade.jpg" alt="I denne lade døde Andreas på tragisk vis" class="banner" loading="lazy">
        <p class="photo-credit">I denne lade døde Andreas på tragisk vis. Foto: Michael Guldberg</p>

        <p><strong>Ærø:</strong> Jesper Helstrup og Andreas Michalikowski tog ofte turen til Østeuropa for at lave forretninger eller besøge Andreas' familie. Det var den slags arbejdsgiver-/arbejdstagerforhold, de havde. Hver gang de kørte den tur, sørgede de altid for at komme ind på de få gratis toiletter, der er tilbage langs motorvejene i Tyskland. Andreas var nærig på den måde, man kun kan grine lidt af. Og de skulle altid have en bockwurst på en bestemt rasteplads i Tyskland.</p>

        <p>Da de tog den tur en eftermiddag i maj, skulle de besøge de samme toiletter, spise de samme pølser. Kort sagt tage akkurat den samme tur. Men noget var anderledes denne gang.</p>

        <p>I stedet for at sidde på forsædet, som han plejede, lå Andreas' aske i en urne på bagsædet.</p>

        <p>Jesper tog turen på de 770 kilometer fra Marstal på Ærø, hvor Andreas døde, til Luban i Polen, hvor Andreas voksede op, for at begrave sin ven.</p>

        <p>Andreas selv havde taget turen mange gange i løbet af de 27 år, han har kendt og arbejdet med Jesper. Første gang, han tog turen til Danmark, var i start 80'erne. Andreas skulle gå på landbrugsskolen i Holstebro, og i løbet af den tid voksede hans interesse for landbrugsmaskiner.</p>

        <p><img src="images/tekst/andreas/02-portraet.jpg" alt="Efter Andreas' bisættelse fik Jesper et billede af ham med hjem" loading="lazy"></p>
        <p class="photo-credit">Efter Andreas' bisættelse fik Jesper et billede af ham med hjem. Foto: Michael Guldberg</p>

        <p>Det var gennem landbrugsmaskinerne, Jesper først stiftede bekendtskab med Andreas.</p>

        <h3>Ford Super Major</h3>

        <p>Da Jesper boede i Bramming satte han en traktor til salg i Den Blå Avis, en ældre Ford Super Major. Der var ikke mange, der havde vist interesse for den gamle traktor, udover en enkelt polsk mand.</p>

        <p>– Jah jah. Jeg komme forbi, havde manden sagt på gebrokkent dansk i telefonen.</p>

        <p><img src="images/tekst/andreas/MIC_4893-kopi.jpg" alt="" loading="lazy"></p>

        <p>Men manden kom aldrig.</p>

        <p>Flere måneder senere havde Jesper næsten opgivet at få traktoren solgt. Men på en tur fra Bramming til Viborg stod han på en rasteplads syd for byen Thorning og kiggede på to lastbiler med polske nummerplader. Det var en varm dag, så dørene på lastbilerne stod åbne, og de var læsset med gamle traktorer. Og det fik Jesper til at tænke på den polske mand, der havde lovet at komme for at købe den gamle Ford Super Major, men aldrig dukkede op.</p>

        <p>– Jeg prøver sgu at ringe til ham igen, tænkte Jesper.</p>

        <p>Telefonen ringede, og pludselig kunne Jesper høre en ringetone fra et af førerhusene. Telefonen blev taget.</p>

        <p>– Det er Andreas, lød det simultant fra både telefonen og ud af førerhuset på lastbilen.</p>

        <p>Andreas endte med at købe den gamle traktor. Men udover dét var der ikke nogen kontakt mellem de to mænd i lang tid. Indtil en dag, omkring et halvt år senere, da Andreas pludselig stod på Jespers fars dørtrin. Han havde det ikke godt og var kommet i økonomiske problemer.</p>

        <p><img src="images/tekst/andreas/04-bryllup.jpg" alt="Andreas' bryllupsfoto" loading="lazy"></p>
        <p class="photo-credit">Andreas' bryllupsfoto. Foto: Privatfoto</p>

        <p>Af en eller anden grund havde der været en følelse i Andreas der sagde, at han kunne få hjælp hos Jesper.</p>

        <p>Det kunne han. Han fik lov til at sætte en campingvogn op hos Jespers far, hvor han kunne bo, indtil han fandt sit fodfæste igen.</p>

        <h3>Den Polske Ambassade</h3>

        <p>Andreas skulle vise sig at være et bekendtskab, der var noget eksotisk for bramminggenserne. Campingvognen blev kaldt for "Den Polske Ambassade", fordi der kom et utal af mennesker med forskellig baggrund og nationaliteter forbi. Kasakhere, ukrainere og russere frekventerede campingvognen.</p>

        <p>Det var der, Jesper opdagede, at Andreas kunne tale med dem alle. Faktisk talte han otte sprog. Måske ikke perfekt, men kan kunne begå sig.</p>

        <p>Der gik det op for Jesper, at han kunne bruge Andreas som partner og tolk til at sælge landbrugsmaskiner fra Danmark til Østeuropa.</p>

        <p><img src="images/tekst/andreas/05-jesper.jpg" alt="Jesper Helstrup mistede sin ven og kollega gennem 27 år" loading="lazy"></p>
        <p class="photo-credit">Jesper Helstrup mistede sin ven og kollega gennem 27 år. Foto: Michael Guldberg</p>

        <p>I de følgende år fandt Jesper ud af, at Andreas var noget særligt. Han kunne tale på flydende russisk om komplekse, tekniske specifikationer på de mange forskellige maskiner, de havde med at gøre. Han forstod sig på globalpolitiske problemstillinger. Og så var han en sælger af Guds nåde. Hvis den potentielle kunde ikke kunne se meningen med at købe en given maskine, så kunne Andreas skabe det behov. Dog kunne det ske, at Andreas' metoder skabte flere problemer, end de løste.</p>

        <p>Når man laver den slags forretninger i Østeuropa, så kommer der nogle gange de forkerte mennesker frem fra skyggerne. Det mærkede Andreas og Jesper på egen krop, da de pludselig stod med en invitation til en audiens hos den ukrainske mafia. De skulle bruge nogle reservedele.</p>

        <p>Andreas og Jesper blev enige om, at det var en dårlig idé at have fakturaer liggende hos den slags typer, men de ville heller ikke fornærme dem. Så de deltog i middagen hos mafiaen, men fabrikerede en historie om, at Andreas faktisk slet ikke lavede den slags forretning mere, og Jesper lige var blevet skadet og syg, så han kunne ikke leve op til den høje standard, som de forventede.</p>

        <h3>Ærø</h3>

        <p>Da faren døde, vendte Jesper bunden i vejret på sit liv. Landbruget blev solgt, og han ledte efter nye græsmarker, hvor han kunne leve sit liv i ro og mag. Måske opbygge et landbrug, som hans søn kunne overtage. Uden at se huset købte han en bolig på Ærø. Og Andreas fulgte med.</p>

        <p>Andreas blev straks forelsket i øen. Han var glødende katolik, så han begyndte at frekventere de lokale kirker hver søndag. Det var ikke som at komme i den katolske kirke i Esbjerg, men det var godt nok.</p>

        <p>– Her kunne jeg godt se mig selv blive gammel, sagde han.</p>

        <p>Men det kunne ikke sådan lige lade sig gøre, fordi han ikke havde fast arbejde i Danmark, hvilket gjorde, at han heller ikke kunne købe et hus.</p>

        <p>Men igen kom Andreas og Jespers kendskab de to venner til gode. Jesper ansatte Andreas på sin gård til en fast månedsløn, så han kunne købe et hus på Ærø, som han således kunne blive gammel i.</p>

        <p>Andreas begyndte at dyrke haven, beskære træerne langs vejen og generelt nusse om det lille stykke natur, han havde rundt om det lille hus i Leby. Det blev hans lille oase.</p>

        <p>Særligt var han stolt af sine solsikker. Han fik fragtet specielle solsikkefrø herop fra Polen, som han dyrkede i sin lille forhave. Solsikkerne var som ham selv. Fra simple kår i Polen, men trives så snart de kom i dansk jord.</p>

        <h3>Herborg roeskærer</h3>

        <p>Andreas arbejdede ikke sådan rigtigt på Jespers gård. Han passede lidt dyr, beskar nogle træer og passede haven. Men det strukturerede arbejde på gården kom først, da Jesper blev syg med en blodprop.</p>

        <p>Så skulle Andreas tage over på mange flere fronter. Heldigvis havde han masser af erfaring som landmand fra sin tid på landbrugsskolen i Holstebro.</p>

        <p>Jesper kom en dag i december ind til Andreas, der var igang med fjerne en sten fra en Herborg roeskærer. Den er sat op på den måde, at man putter roer ned i en to meter høj cylinder, hvori der roterer et spiralformet skær, der snitter roerne. Maskinen kørte stadig, idet Andreas kæmpede med at få stenen ud.</p>

        <p>– Det må du fandme ikke gøre, Andreas, havde Jesper fortalt.</p>

        <p>Maskinen skulle være slukket, når man prøver på den slags.</p>

        <p>– Jeg har arbejdet med sådan en maskine, siden jeg var 25 år. Jeg har styr på det, sagde Andreas.</p>

        <p>Men den indstilling til netop den maskine kom til at koste Andreas livet. En morgen i marts 2021 gik det galt.</p>

        <h3>Ulykken</h3>

        <p>Ingen ved præcist, hvad der skete, fordi Andreas var den eneste til stede den skæbnesvangre morgen.</p>

        <p>Men noget tyder på, at præcist det samme var sket, som den dag i december. Der havde sat sig en sten fast i den gamle Herborg roeskærer. Og Andreas begik den hybris at ville fjerne stenen med et koben, mens maskinen stadig var sat til.</p>

        <p><img src="images/tekst/andreas/06-traesko.jpg" alt="Andreas' træsko ligger stadig uforstyrret i laden" loading="lazy"></p>
        <p class="photo-credit">Andreas' træsko ligger stadig uforstyrret i laden, hvor han døde. Foto: Michael Guldberg</p>

        <p>Da stenen var blevet løsrevet, gik maskinen igang igen. Og det store snekkegear i toppen af landbrugsmaskinen satte i rotationer. Enorme kræfter begyndte at rykke i maskinen, og med sig rev den Andreas' hættetrøje.</p>

        <p>Andreas kunne ikke nå at reagere. Med voldsom kraft blev han trukket bagud ned mod maskinen. Hans hals blev presset ind mod det kolde metal, og på grund af den måde, hvorpå maskinen havde fået fat i hans hætte, blev hans hovedpulsåre klemt af. Det var ovre i løbet af få sekunder.</p>

        <p>Selv hvis der havde været en person til at trække stikket ud, ville det ikke have gjort nogen forskel.</p>

        <p>Under en time senere ankom Jesper til gården. Uanende gik han ind i laden, hvor roeskæreren stod. Det gav et sæt i ham, da han passerede en gravko, der stod i døråbningen, kiggede til venstre, og så sin ven gennem 27 år, helt blå i hovedet, hængende fra roeskærerens kant. Død.</p>

        <h3>Polsk øl</h3>

        <p>En måned efter ulykken sidder Jesper i sit køkken og fortæller om hele forløbet. Han er lige kommet hjem fra Polen, hvortil han har transporteret Andreas' urne for at blive begravet. Jævnfør en aktindsigt fra arbejdstilsynet som Fyns Amts Avis har fået, bliver Andreas' død kategoriseret som en arbejdsulykke, som Jesper ikke kunne have gjort noget ved. Roeskæreren blev af arbejdstilsynet godkendt til at arbejde videre, men Jesper har destrueret den. Han kan simpelthen ikke holde ud at have en maskine stående, der har slået hans ven ihjel.</p>

        <p><img src="images/tekst/andreas/07-maskinen.jpg" alt="Maskinen der tog livet af Andreas" loading="lazy"></p>
        <p class="photo-credit">Maskinen der tog livet af Andreas ligger stadig på gården, men den er blevet destrueret. Andreas' trøje hænger stadig i snekkegearet. Foto: Michael Guldberg</p>

        <p>Da journalisten fra Fyns Amts Avis ankommer til Jespers gård, bliver han ikke budt på kaffe, men en polsk øl af mærket Zubr. På logoet er der en stor bisonokse.</p>

        <p>– Det føler jeg faktisk er mere passende end kaffe, siger Jesper i en lidt dyster tone.</p>

        <p>Jesper er en stor mand. Både i højde og drøjde. Han taler i et dybt toneleje med tung jysk dialekt. Det er tydeligt, at han bliver meget berørt af at tale om Andreas. Når han taler om landbrugsmaskiner, eller nogle af de eventyr han var på med Andreas, taler han hurtigt, nærmest rytmeløst. Men når samtalen falder på ulykken, knækker hans stemme og bliver sagte.</p>

        <p>– Andreas ville gerne være blevet gammel og dø på Ærø. Han fik kun lov til det ene, siger han.</p>

        <p style="margin-top:40px;font-size:12px;color:#888;">
          Oprindeligt bragt i Fyns Amts Avis, 8. juni 2021 ·
          <a href="https://faa.dk/navne/andreas-doede-i-tragisk-arbejdsulykke-naaede-aldrig-at-blive-gammel-paa-sin-droemmeoe"
             target="_blank" rel="noopener" style="color:#888;text-decoration:underline;">
            læs originalen her ↗
          </a>
        </p>
      `
    },
    {
      title: "Sexkino i Odense: Kom med i de forbudte lysters klub",
      meta:  "",
      body: `
        <img src="images/tekst/sexkino/00-intro.gif" alt="Sexkino" class="banner" loading="lazy">

        <p>– Det er fandme et frækt skæg, du har, siger en høj, ranglet mand til mig, i det vi går forbi hinanden i en mørk gang, kun let oplyst af røde neonlys fra de nærtliggende korridorer.</p>

        <p>Lyset fra den selvlysende penisring flimrer og flakker, når han med et fast tag om sit erigerede lem gnider hånden frem og tilbage.</p>

        <p>I modsætning til den tunge lugt af gammel sved, der ellers huserer overalt her, dufter han nyvasket. Han har været i bad. Han har gjort sig klar til at komme herned.</p>

        <p>Det eneste, man kan høre udover forsigtige klipklapper-skridt fra rundt omkring på gangene, er kvindestøn bag lukkede døre.</p>

        <p>– Må jeg ikke godt røre lidt ved dig inde i mørkerummet, spørger han, mens hans blege, blottede bryst giver genskær fra lysstofrørene.</p>

        <p>– Vi er et par stykker derinde, fortsætter han. Han har bukser på, men de står åbne på en måde, så han med små, korte skridt må vrælte sig fremad, mens han onanerer til synet af den nyankomne person. Det vil sige mig.</p>

        <p>Som fotograf på Fyens Stiftstidende har jeg begivet mig ind i sexkinoen på Vesterbro med et professionelt anliggende og dermed ikke for at få tilbud fra stedets gæster. Men mandens toneleje afvæbner mig. Han taler til mig på en afslappet og næsten hyggelig måde. Det føles næsten ikke som en seksuel forespørgsel, han kommer med. Det føles som et hurtigt kompliment til en fremmed på gaden.</p>

        <p>Eller som en flink håndsrækning til et nyt medlem i klubben, der ikke ved, hvad han skal gøre af sig selv andet end at takke "ja".</p>

        <p>Og dog.</p>

        <p>– Nej tak. Jeg er her faktisk bare for at kigge, siger jeg let stammende.</p>

        <p>– Ej, hvor du driller, siger han og griner. Stadig med sit lem i hånden.</p>

        <p>Biografen er ikke en biograf som vi kender det med en stor sal. Den består derimod af en række rum i forskellig størrelse, hvor man kan gå ind enten alene eller som en gruppe. Forskellige rum er udstyret med forskellige ting, man kan bruge som gloryholes eller kors, man kan hænges op på.</p>

        <p>Ude i gangen, udenfor selve biografen, er der et rum. Et rum med ti hylder, hver med to DVD-afspillere på hver hylde. Det er derfra, alle filmene bliver afspillet, så man inde i biografen frit kan skifte mellem filmene med et simpelt tryk på en kontakt.</p>

        <p>Filmene bliver valgt fra dag til dag, men langt fra tilfældigt. En film må ikke vises to gange indenfor en seks måneders periode. At udvælge dagens film er derfor lidt af et logistisk arbejde, som kræver sin mand. En mand ved navn Morten Monin.</p>

        <p>– Vi viser ikke film med tis eller afføring. Det bliver simpelthen for meget derned i kinoen, siger Morten Monin, der er markedsføringschef for Sexkinoen.</p>

        <p>Det er tydeligt at mærke på Sahar, at hun ikke ved, hvad hun skal gøre. Hun fortæller, at hun har en eksamen den 27. april, som hun ikke ved, om hun må tage. Men til trods for det forbereder hun sig alligevel.</p>

        <p>– Jeg gør bare, hvad jeg kan for at være mere sammen med min familie. Og det her har bare gjort, at jeg koncentrerer mig endnu mere om min uddannelse. Der er ingen, der kan stoppe mig fra at opnå min drøm, siger hun og fortsætter:</p>

        <p>– Jeg har et liv i Danmark. At komme på udrejsecenter kommer bare til at adskille mig fra mit liv her, siger hun, mens tårerne triller ned ad kinderne på hende.</p>

        <h3>Kærshovedgaard</h3>

        <p>Sahars advokat, Niels-Erik Hansen, har specialiseret sig i asyl-sager, men virker alligevel forbløffet over afgørelsen, da JydskeVestkysten ringer til ham.</p>

        <p>– Alle i familien har jo asyl. Så vi sidder her med en omvendt Robin Hood. Den eneste, der ikke får beskyttelse er denne her unge kvinde.</p>

        <p>– De unge mænd får jo automatisk asyl, når de bliver 18. Men kvinderne skal åbenbart tilbage, hvor de så skal forklare, hvorfor deres familie var illoyale over for styret. Så må vi frygte, at de bliver udsat for overgreb. Det er også derfor, man godt kan kigge lidt undrende på systemet, når de netop siger, at det er de forkerte der søger asyl. Her mener man mænd. Så står de her med en ung kvinde, der er i gang med at uddanne sig, og hun kan ikke få asyl, når det netop er hende, der bør have beskyttelse. Det virker hult og hyklerisk, siger han.</p>

        <p>I Flygtningenævnets afgørelse forklares det, at man fra og med juni 2019 vurderer, at de aktuelle forhold i Damaskus ikke længere er af en sådan karakter, at enhver vil være i reel risiko for at blive udsat for overgreb i strid med Den Europæiske Menneskerettighedskonvention alene som følge af deres tilstedeværelse i området.</p>

        <p>Men Niels-Erik Hansen forklarer, at Danmark ikke samarbejder med Syrien, så hvis Sahar ikke har tænkt sig at tage tilbage til Syrien frivilligt, så kan hun reelt ikke tvinges.</p>

        <p>– Vi har en fuldstændig grotesk situation i disse sager. Fordi normalt, så er det sådan, at politiet kan hente dig og sætte dig i en flyvemaskine. Men det kan man ikke her, fordi de danske myndigheder ikke samarbejder med styret i Syrien, siger Niels-Erik Hansen, og fortsætter:</p>

        <p>– Man har sådan set dømt hende til et ophold på udrejsecenteret Kærshovedgaard. Det koster 300.000 om året af skatteydernes penge. Samtidig fratager man hende muligheden for at færdiggøre sin uddannelse og betale skat, som en god samfundsborger.</p>
